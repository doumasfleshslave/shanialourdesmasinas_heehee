<!DOCTYPE html>
<html>

<head>

<title>Browser Outputs</title>

<style>

body{
background:#e8d7b3;
font-family:Arial;
text-align:center;
color:#3b2b17;
}

header{
background:#c9a66b;
padding:30px;
box-shadow:0 0 20px #b0894f;
}

.output{
background:#f4e6c8;
margin:40px;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px #b0894f;
}

img{
width:400px;
border-radius:10px;
box-shadow:0 0 20px #b0894f;
transition:0.4s;
}

img:hover{
transform:scale(1.08);
}

</style>

</head>

<body>

<header>

<h1>3rd Quarter Browser Outputs</h1>

<iframe width="425" height="250"
src="https://youtu.be/XY6fbugcisY?si=otRMCx1i_L_P1zHF"
title="In The Closet"
frameborder="0"
allowfullscreen>
</iframe>

</header>

<div class="output">
<h3>Browser Output 1</h3>
<img src="images/browser1.png">
</div>

<div class="output">
<h3>Browser Output 2</h3>
<img src="images/browser2.png">
</div>

<div class="output">
<h3>Browser Output 3</h3>
<img src="images/browser3.png">
</div>

</body>
</html>
