<!DOCTYPE html>
<html>

<head>

<title>Noli Me Tangere</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
animation:fadein 2s;
}

header{
background:#333;
padding:30px;
box-shadow:0 0 25px #777;
animation:glowheader 4s infinite alternate;
}

video{
margin-top:40px;
width:700px;
border-radius:10px;
box-shadow:0 0 20px #999;
transition:0.4s;
}

video:hover{
transform:scale(1.03);
box-shadow:0 0 35px #ffffff;
}

@keyframes fadein{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glowheader{
from{
box-shadow:0 0 20px #666;
}
to{
box-shadow:0 0 35px #aaa;
}
}

body{
animation:backgroundpulse 8s infinite alternate;
}

@keyframes backgroundpulse{
from{
background:#111;
}
to{
background:#1a1a1a;
}

}

</style>

</head>

<body>

<header>

<h1>Noli Me Tangere Drama Presentation</h1>

</header>

<iframe width="800" height="450"
src="https://drive.google.com/file/d/1S_AuxlT-YRXd7fa8oveV1gddOMZrWzBi/view?usp=sharing"
allowfullscreen>
</iframe>

</body>
</html>
