<!DOCTYPE html>
<html>

<head>

<title>3rd Quarter Events</title>

<style>

body{
background:#000814;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#001d3d;
padding:30px;
box-shadow:0 0 25px #00b4ff;
}

h1{
text-shadow:0 0 15px #00b4ff;
}

.event{
margin:50px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.gallery img{
width:260px;
border-radius:10px;
box-shadow:0 0 15px #00b4ff;
transition:0.4s;
animation:neonglow 2s infinite alternate;
}

.gallery img:hover{
transform:scale(1.1);
box-shadow:0 0 30px #00e5ff;
}

@keyframes neonglow{

from{
box-shadow:0 0 10px #0096c7;
}

to{
box-shadow:0 0 25px #00e5ff;
}

}

</style>

</head>

<body>

<header>

<h1>3rd Quarter Events</h1>

<iframe width="425" height="250"
src="https://youtu.be/ElN_4vUvTPs?si=E5Yy-zffZlHDY3Q8"
title="Human Nature"
frameborder="0"
allowfullscreen>
</iframe>

</header>


<div class="event">

<h2>MVP</h2>

<div class="gallery">

<img src="images/mvp1.jpg">
<img src="images/mvp2.jpg">

</div>

</div>


<div class="event">

<h2>Booklandia</h2>

<div class="gallery">

<img src="images/booklandia1.jpg">
<img src="images/booklandia2.jpg">

</div>

</div>


<div class="event">

<h2>Math Idol</h2>

<div class="gallery">

<img src="images/mathidol1.jpg">
<img src="images/mathidol2.jpg">

</div>

</div>


</body>
</html>
